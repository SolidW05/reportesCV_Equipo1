<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Test Ubicacion Service</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: Arial, sans-serif;
        display: flex;
        height: 100vh;
    }

    #mapa {
        width: 60%;
        height: 100vh;
    }

    #panel {
        width: 40%;
        padding: 20px;
        background: #f5f5f5;
        overflow-y: auto;
    }

    h2 { margin-bottom: 15px; color: #333; }

    #busqueda {
        display: flex;
        gap: 8px;
        margin-bottom: 20px;
    }

    #busqueda input {
        flex: 1;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
    }

    button {
        padding: 8px 14px;
        background: #4CAF50;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }

    button:hover { background: #45a049; }

    #resultado {
        background: white;
        border-radius: 8px;
        padding: 15px;
        border: 1px solid #ddd;
    }

    #resultado h3 {
        margin-bottom: 10px;
        color: #555;
        font-size: 14px;
        text-transform: uppercase;
    }

    .campo {
        display: flex;
        justify-content: space-between;
        padding: 6px 0;
        border-bottom: 1px solid #eee;
        font-size: 14px;
    }

    .campo:last-child { border-bottom: none; }

    .label { color: #888; }
    .valor { color: #333; font-weight: bold; text-align: right; max-width: 60%; }

    #instruccion {
        color: #888;
        font-size: 13px;
        margin-bottom: 15px;
        padding: 10px;
        background: #fff3cd;
        border-radius: 4px;
    }

    #loading {
        display: none;
        color: #888;
        font-size: 13px;
        margin: 10px 0;
    }

    #error {
        display: none;
        color: #e53935;
        font-size: 13px;
        margin: 10px 0;
        padding: 10px;
        background: #ffebee;
        border-radius: 4px;
    }
  </style>
</head>
<body>

<div id="mapa"></div>

<div id="panel">
  <h2>🗺️ Ubicacion Service</h2>

  <div id="busqueda">
    <input type="text" id="inputBusqueda" placeholder="Buscar municipio... ej: Zapopan Jalisco"/>
    <button onclick="buscarMunicipio()">Buscar</button>
  </div>

  <p id="instruccion">👆 Haz clic en el mapa para obtener la dirección</p>
  <p id="loading">⏳ Consultando...</p>
  <p id="error"></p>

  <div id="resultado" style="display:none">
    <h3>Dirección encontrada</h3>
    <div class="campo"><span class="label">ID guardado</span><span class="valor" id="r-id">-</span></div>
    <div class="campo"><span class="label">Dirección</span><span class="valor" id="r-direccion">-</span></div>
    <div class="campo"><span class="label">Calle</span><span class="valor" id="r-calle">-</span></div>
    <div class="campo"><span class="label">Número</span><span class="valor" id="r-numero">-</span></div>
    <div class="campo"><span class="label">Colonia</span><span class="valor" id="r-colonia">-</span></div>
    <div class="campo"><span class="label">C.P.</span><span class="valor" id="r-cp">-</span></div>
    <div class="campo"><span class="label">Municipio</span><span class="valor" id="r-municipio">-</span></div>
    <div class="campo"><span class="label">Estado</span><span class="valor" id="r-estado">-</span></div>
    <div class="campo"><span class="label">País</span><span class="valor" id="r-pais">-</span></div>
  </div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  // URL de tu microservicio
  const API = 'http://localhost:8085';

  // Inicializar mapa centrado en Guadalajara
  const mapa = L.map('mapa').setView([20.6597, -103.3496], 12);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
  }).addTo(mapa);

  let marcador = null;

  // Click en el mapa → llama al reverse geocoding
  mapa.on('click', async (e) => {
      const { lat, lng } = e.latlng;

      // Poner marcador
      if (marcador) mapa.removeLayer(marcador);
      marcador = L.marker([lat, lng]).addTo(mapa);

      mostrarLoading(true);
      ocultarError();
      document.getElementById('resultado').style.display = 'none';

      try {
          const res = await fetch(`${API}/api/ubicacion/reverse?lat=${lat}&lng=${lng}`);
          const data = await res.json();

          if (!res.ok) throw new Error(data.error || 'Error desconocido');

          mostrarResultado(data);
          marcador.bindPopup(`<b>${data.municipio}</b><br>${data.direccionCompleta}`).openPopup();

      } catch (err) {
          mostrarError('Error: ' + err.message);
      } finally {
          mostrarLoading(false);
      }
  });

  // Buscar municipio → llama al forward geocoding
  async function buscarMunicipio() {
      const query = document.getElementById('inputBusqueda').value.trim();
      if (!query) return;

      mostrarLoading(true);
      ocultarError();

      try {
          const res = await fetch(`${API}/api/ubicacion/forward?query=${encodeURIComponent(query)}`);
          const data = await res.json();

          if (!res.ok) throw new Error(data.error || 'No encontrado');

          // Centrar el mapa en el resultado
          mapa.setView([data.latitud, data.longitud], 13);

      } catch (err) {
          mostrarError('No se encontró: ' + err.message);
      } finally {
          mostrarLoading(false);
      }
  }

  // Enter en el input también busca
  document.getElementById('inputBusqueda').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') buscarMunicipio();
  });

  function mostrarResultado(data) {
      document.getElementById('r-id').textContent       = data.id || '-';
      document.getElementById('r-direccion').textContent = data.direccionCompleta || '-';
      document.getElementById('r-calle').textContent    = data.calle || '-';
      document.getElementById('r-numero').textContent   = data.numero || '-';
      document.getElementById('r-colonia').textContent  = data.colonia || '-';
      document.getElementById('r-cp').textContent       = data.codigoPostal || '-';
      document.getElementById('r-municipio').textContent = data.municipio || '-';
      document.getElementById('r-estado').textContent   = data.estado || '-';
      document.getElementById('r-pais').textContent     = data.pais || '-';
      document.getElementById('resultado').style.display = 'block';
  }

  function mostrarLoading(show) {
      document.getElementById('loading').style.display = show ? 'block' : 'none';
  }

  function mostrarError(msg) {
      const el = document.getElementById('error');
      el.textContent = msg;
      el.style.display = 'block';
  }

  function ocultarError() {
      document.getElementById('error').style.display = 'none';
  }
</script>

</body>
</html>
