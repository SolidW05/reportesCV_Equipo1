server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          routes:
            - id: report-service
              uri: lb://report-service
              predicates:
                - Path=/api/report/**
            - id: locations-service
              uri: lb://ubicacion
              predicates:
                - Path=/api/ubicacion/**
            - id: authorities-service
              uri: lb://autoridades-service
              predicates:
                - Path=/api/autoridad/**
            - id: users-service-users
              uri: lb://userservice
              predicates:
                - Path=/api/users/**
            - id: users-service-auth
              uri: lb://userservice
              predicates:
                - Path=/api/auth/**
                

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true


